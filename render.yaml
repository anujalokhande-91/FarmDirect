services:
  - type: static_site
    name: FarmDirect-1
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - path: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://farmdirect-backend.onrender.com/api
